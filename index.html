<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insight Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#F5F2EC;
  --cream2:#EDE9E0;
  --ink:#13120F;
  --ink2:#2A2820;
  --blue:#2B5EC7;
  --blue2:#1A4FBF;
  --muted:#8A8680;
  --border:#D8D4CC;
  --white:#FFFFFF;
}
html{scroll-behavior:smooth;background:var(--cream);margin:0;padding:0;width:100%}
body{font-family:'DM Sans','Noto Sans KR',sans-serif;color:var(--ink);background:var(--cream);overflow-x:hidden;width:100%;margin:0;padding:0}

/* ── LOGO ── */
.logo{display:inline-flex;flex-direction:column;align-items:flex-start;text-decoration:none;line-height:1;gap:0}
.logo-i{font-family:'Playfair Display',serif;font-style:italic;font-weight:400;font-size:var(--li,28px);color:var(--blue);letter-spacing:0.3px;line-height:1;display:block}
.logo-l{font-family:'Cormorant Garamond',serif;font-style:normal;font-weight:600;font-size:var(--ll,24px);color:var(--ink);letter-spacing:2px;display:block;line-height:1;margin-top:0px;padding-left:2px}
nav .logo{--li:20px;--ll:17px}
footer .logo{--li:32px;--ll:27px}
footer .logo .logo-l{color:var(--cream)}
footer .logo .logo-i{color:#7BAAF7}

/* ── GATE ── */
#gate{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;
  background:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;
}
.gate-line-h{position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,.04)}
.gate-line-v{position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.04)}
.gate-corner{position:absolute;font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:2.5px;color:rgba(255,255,255,.15);text-transform:uppercase}
.gate-corner.tl{top:36px;left:44px}
.gate-corner.tr{top:36px;right:44px;text-align:right}
.gate-corner.bl{bottom:36px;left:44px}
.gate-corner.br{bottom:36px;right:44px;text-align:right}
.gate-inner{position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:0}
.gate-logo{opacity:0;animation:gUp 1s .3s ease forwards}
.gate-logo .logo-i{font-size:clamp(60px,12vw,120px);color:#7BAAF7}
.gate-logo .logo-l{font-size:clamp(50px,10vw,100px);color:var(--white);letter-spacing:6px;padding-left:4px}
.gate-rule{width:0;height:1px;background:rgba(255,255,255,.18);margin:40px auto;animation:gRule 1s .9s ease forwards;opacity:0}
@keyframes gRule{to{width:120px;opacity:1}}
.gate-sub{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:400;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:52px;opacity:0;animation:gUp .8s 1.1s ease forwards}
.gate-btn{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.7);background:transparent;border:1px solid rgba(255,255,255,.2);padding:14px 48px;cursor:pointer;transition:all .35s;position:relative;overflow:hidden;opacity:0;animation:gUp .8s 1.3s ease forwards}
.gate-btn::before{content:'';position:absolute;inset:0;background:var(--blue2);transform:scaleX(0);transform-origin:left;transition:transform .35s ease}
.gate-btn:hover::before{transform:scaleX(1)}
.gate-btn span{position:relative;z-index:1}
@keyframes gUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}



/* ── MAIN ── */
#main{opacity:1;width:100%;overflow-x:hidden}


/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  height:64px;display:flex;align-items:center;justify-content:space-between;
  padding:0 6%;
  transition:background .4s,border-color .4s;
  border-bottom:1px solid transparent;
}
nav.solid{background:rgba(245,242,236,.96);backdrop-filter:blur(12px);border-color:var(--border)}
.nav-links{display:flex;gap:0;list-style:none}
.nav-links a{font-family:'DM Sans','Noto Sans KR',sans-serif;font-size:15px;font-weight:400;letter-spacing:.5px;color:var(--muted);text-decoration:none;padding:8px 16px;transition:color .2s;position:relative}
.nav-links a:hover,.nav-links a.on{color:var(--blue);font-weight:500}

.nav-cta{font-family:"DM Sans","Noto Sans KR",sans-serif;font-size:15px;font-weight:500;letter-spacing:.5px;color:var(--blue);text-decoration:none;padding:8px 16px;transition:color .2s}
.nav-cta:hover{opacity:.65}
.ham{display:none;flex-direction:column;gap:4px;cursor:pointer;background:none;border:none}
.ham span{width:20px;height:1px;background:var(--ink);display:block}
.mob{display:none;position:fixed;top:64px;left:0;right:0;background:var(--cream);z-index:499;padding:20px 6%;flex-direction:column;border-top:1px solid var(--border)}
.mob.open{display:flex}
.mob a{font-size:14px;color:var(--ink);text-decoration:none;padding:14px 0;border-bottom:1px solid var(--border)}
.mob a:last-child{color:var(--blue);border:none;margin-top:6px}

/* ── HERO — 타이포그래피 중심 ── */
.hero{
  min-height:100vh;
  display:grid;
  grid-template-columns:1fr 1fr;
  position:relative;
  overflow:hidden;
}
.hero-left{
  background:var(--ink);
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:120px 8% 80px;
  position:relative;overflow:hidden;
}
.hero-left::before{
  content:'';position:absolute;
  top:-20%;right:-30%;
  width:600px;height:600px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.04);
}
.hero-eyebrow{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:32px;display:flex;align-items:center;gap:10px}
.hero-eyebrow::before{content:'';width:20px;height:1px;background:rgba(255,255,255,.3)}
.hero-h1{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(52px,7vw,92px);font-weight:400;color:var(--white);line-height:1.05;letter-spacing:-1px;margin-bottom:32px}
.hero-h1 span{color:#7BAAF7;font-style:normal;font-family:'Cormorant Garamond',serif;font-weight:300;display:block;font-size:.55em;letter-spacing:6px;text-transform:uppercase;margin-bottom:8px}
.hero-caption{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:300;color:rgba(255,255,255,.4);line-height:1.9;max-width:360px;margin-bottom:52px}
.hero-btns{display:flex;gap:16px;flex-wrap:wrap}
.btn-ink{font-family:"DM Sans","Noto Sans KR",sans-serif;font-size:14px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.9);background:transparent;border:2px solid rgba(255,255,255,.6);padding:16px 40px;text-decoration:none;transition:all .3s}
.btn-ink:hover{background:rgba(255,255,255,.12);color:white;border-color:white}
.btn-blue{font-family:"DM Sans","Noto Sans KR",sans-serif;font-size:14px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--white);background:var(--blue);border:2px solid var(--blue);padding:16px 40px;text-decoration:none;transition:background .2s}
.btn-blue:hover{background:var(--blue2)}

.hero-right{
  background:var(--cream2);
  display:flex;flex-direction:column;justify-content:flex-end;
  position:relative;overflow:hidden;
  padding:120px 8% 80px;
}
.hero-right img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.35;mix-blend-mode:multiply}
.hero-stats{position:relative;z-index:2;display:flex;flex-direction:column;gap:0}
.hstat{padding:28px 0;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:16px}
.hstat:last-child{border-bottom:none}
.hstat-n{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:300;color:var(--ink);line-height:1}
.hstat-l{font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}

/* ── ABOUT — 풀와이드 텍스트 중심 ── */
.about{padding:0;background:var(--cream);width:100%;overflow:hidden}
.about-top{display:grid;grid-template-columns:1fr 1fr;width:100%;align-items:stretch}
.about-headline-wrap{background:var(--ink);padding:80px 8% 48px;display:flex;flex-direction:column;justify-content:flex-end;position:relative;overflow:hidden}
.about-headline-wrap::before{
  content:'';position:absolute;
  bottom:-20%;left:-20%;
  width:500px;height:500px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.035);
  pointer-events:none;
}
.atag{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:28px;display:flex;align-items:center;gap:10px}
.atag::before{content:'';width:20px;height:1px;background:rgba(255,255,255,.25)}
.about-headline{
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:clamp(44px,6vw,78px);
  font-weight:400;
  color:var(--white);
  line-height:1.1;
  margin-bottom:36px;
  letter-spacing:-1px;
}
.about-headline em{
  font-style:normal;
  color:#7BAAF7;
}
.about-rule{width:48px;height:1px;background:rgba(255,255,255,.2);margin-bottom:32px}
.about-manifesto{font-size:17px;color:rgba(255,255,255,.7);line-height:2;
  font-family:'DM Sans',sans-serif;
  font-size:clamp(13px,1.3vw,15px);
  font-weight:300;
  color:rgba(255,255,255,.45);
  line-height:1.95;
  max-width:460px;
}
.about-manifesto strong{color:rgba(255,255,255,.7);font-weight:400}
.about-manifesto em{color:#7BAAF7;font-style:italic}
.about-right-col{display:flex;flex-direction:column;position:relative;overflow:hidden;min-height:auto;background:var(--ink)}
.about-photo-wrap{flex:none;position:relative;overflow:hidden;height:480px;background:var(--ink)}
.about-photo-wrap img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0}
.about-photo-wrap:hover img{filter:grayscale(0%) brightness(1)}
.about-photo-caption{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(19,18,15,.75));padding:24px 32px;font-family:"DM Sans","Noto Sans KR",sans-serif;font-size:14px;letter-spacing:2px;color:rgba(255,255,255,.9)}
.about-stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  border-top:1px solid var(--border);
}
.ast{padding:24px 20px;border-right:1px solid var(--border);text-align:left}
.ast:last-child{border-right:none}
.ast-n{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,3vw,40px);font-weight:300;color:var(--ink);line-height:1}
.ast-n span{font-size:.5em;font-family:'DM Sans',sans-serif;color:var(--muted)}
.ast-l{font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:6px}
.about-btns{padding:28px 32px;display:flex;gap:16px;border-top:1px solid var(--border)}
.about-body{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,2.2vw,28px);font-weight:300;color:var(--ink2);line-height:1.8;margin-bottom:32px}
.about-body em{font-style:italic;color:var(--blue)}
.about-sub{font-family:'DM Sans',sans-serif;font-size:16px;font-weight:300;color:var(--muted);line-height:1.9;margin-bottom:40px;max-width:560px}
.btn-minimal{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--ink);text-decoration:none;border-bottom:1px solid var(--ink);padding-bottom:2px;transition:opacity .2s;display:inline-block}
.btn-minimal:hover{opacity:.5}

/* INSIGHT 아코디언형 리스트 */
.insight-list{border-top:1px solid var(--border);padding:80px 6% 0}
.il-item{border-bottom:1px solid var(--border);display:grid;grid-template-columns:60px 1fr 1fr;gap:32px;align-items:start;padding:28px 0;transition:all .25s;cursor:default}
.il-item:hover{background:rgba(0,0,0,.02);padding-left:8px}
.il-letter{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:40px;font-weight:300;color:var(--blue);line-height:1;opacity:.4;transition:opacity .25s}
.il-item:hover .il-letter{opacity:1}
.il-keyword{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--blue);margin-bottom:6px}
.il-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:26px;font-weight:300;color:var(--ink);line-height:1.2}
.il-desc{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:300;color:var(--muted);line-height:1.8;padding-top:4px}

/* ── PROGRAMS — 번호형 풀와이드 리스트 ── */
.programs{padding:80px 6%;background:var(--ink)}
.prog-header{display:flex;justify-content:space-between;align-items:flex-end;max-width:1200px;margin:0 auto 48px;flex-wrap:wrap;gap:16px}
.ph-left .ptag{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.ph-left .ptag::before{content:'';width:20px;height:1px;background:rgba(255,255,255,.25)}
.prog-h2{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(36px,5vw,56px);font-weight:400;color:var(--white);line-height:1.1}
.ph-right{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:300;color:rgba(255,255,255,.35);line-height:1.8;max-width:360px;text-align:right}


.prog-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:var(--blue);opacity:.08;transition:width .4s ease}
.prog-item:hover::before{width:100%}



.pi-desc{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:300;color:rgba(255,255,255,.35);line-height:1.7}
.pi-tags{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.pi-tag{font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:1.5px;color:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.1);padding:4px 10px;text-align:center;white-space:nowrap}

/* ── INSTRUCTOR — 에디토리얼 레이아웃 ── */
.instructor{padding:120px 6%;background:var(--cream)}
.instr-inner{
  max-width:1200px;margin:0 auto;
  display:grid;grid-template-columns:1fr 300px;
  gap:72px;align-items:end;
}
.instr-photo{
  position:relative;flex-shrink:0;align-self:end;
}
.instr-photo-frame{
  width:300px;height:380px;
  border-radius:6px;overflow:hidden;
  position:relative;
  box-shadow:0 24px 60px rgba(0,0,0,.12);
}
.instr-photo-frame img{
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  display:block;
  transition:transform .5s ease;
}
.instr-photo-frame:hover img{transform:scale(1.03)}
/* 사진 옆 장식선 */
.instr-photo::before{
  content:'';
  position:absolute;
  top:20px;left:20px;
  width:300px;height:380px;
  border:1px solid var(--ink);
  border-radius:6px;
  opacity:.35;
  z-index:0;
}
.instr-photo-frame{position:relative;z-index:1}
.instr-photo-badge{display:none}
.ipb-dot{display:none}
.ipb-name{display:none}
.ipb-role{display:none}
.instr-content{display:flex;flex-direction:column;justify-content:center}
.itag{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.itag::before{content:'';width:20px;height:1px;background:var(--muted)}
.instr-h2{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(28px,3.5vw,44px);font-weight:400;color:var(--ink);line-height:1.1;margin-bottom:0}
.instr-rule{width:100%;height:1px;background:var(--border);margin:36px 0}
.instr-cols{display:grid;grid-template-columns:1fr 1fr;gap:24px 48px}
.ic-h{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--blue);margin-bottom:20px}
.ic-list{list-style:none;display:flex;flex-direction:column;gap:10px}
.ic-list li{font-family:'DM Sans','Noto Sans KR',sans-serif;font-size:13px;font-weight:300;color:var(--muted);line-height:1.5;padding-left:14px;position:relative;white-space:nowrap}
.ic-list li::before{content:'';position:absolute;left:0;top:8px;width:6px;height:1px;background:var(--blue);opacity:.6}

/* ── FIELD — 수평 스크롤 갤러리 ── */
.field{padding:0;background:var(--ink2);overflow:hidden}
.field-head{padding:80px 6% 48px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px}
.field-head .ftag{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.field-head .ftag::before{content:'';width:20px;height:1px;background:rgba(255,255,255,.25)}
.field-h2{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(28px,4vw,44px);font-weight:400;color:var(--white)}
.field-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:0 6% 80px}
.fphoto{position:relative;overflow:hidden;aspect-ratio:3/4}
.fphoto img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .7s ease;filter:brightness(.7)}
.fphoto:hover img{transform:scale(1.06);filter:brightness(.5)}
.fphoto-cap{position:absolute;bottom:0;left:0;right:0;padding:20px 18px;background:linear-gradient(transparent,rgba(19,18,15,.85));transform:translateY(4px);transition:transform .3s}
.fphoto:hover .fphoto-cap{transform:translateY(0)}
.fphoto-cap span{font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.6)}

/* ── BLOG — 에디토리얼 그리드 ── */
.blog{padding:140px 6%;background:var(--cream)}
.blog-head{display:flex;justify-content:space-between;align-items:flex-end;max-width:1200px;margin:0 auto 64px;flex-wrap:wrap;gap:20px}
.btag{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.btag::before{content:'';width:20px;height:1px;background:var(--muted)}
.blog-h2{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(28px,4vw,44px);font-weight:400;color:var(--ink)}
.blog-all{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none;border-bottom:1px solid var(--border);padding-bottom:2px;transition:color .2s}
.blog-all:hover{color:var(--ink)}
.filter-bar{display:flex;gap:6px;max-width:1200px;margin:0 auto 40px;flex-wrap:wrap}
.ftab{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;padding:6px 16px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.ftab.active,.ftab:hover{background:var(--ink);color:var(--cream);border-color:var(--ink)}

/* blog grid */
.blog-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:2px;max-width:1200px;margin:0 auto}
.bc{position:relative;overflow:hidden;cursor:pointer}
.bc a{display:block;height:100%;text-decoration:none}
.bc img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .6s ease}
.bc:hover img{transform:scale(1.04)}
.bc-main{min-height:480px}
.bc-right{display:grid;grid-template-rows:1fr 1fr;gap:2px}
.bc-sm{min-height:238px;position:relative;overflow:hidden}
.bc-sm a{display:block;height:100%;text-decoration:none}
.bc-sm img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .6s}
.bc-sm:hover img{transform:scale(1.04)}
.bc-ov{position:absolute;inset:0;background:linear-gradient(transparent 15%,rgba(19,18,15,.92));display:flex;flex-direction:column;justify-content:flex-end;padding:28px}
.bc-cat{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:10px;border-bottom:1px solid rgba(255,255,255,.15);padding-bottom:10px;display:inline-block}
.bc-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:26px;font-weight:300;color:var(--white);line-height:1.3;margin-bottom:8px}
.bc-sm .bc-title{font-size:20px}
.bc-meta{font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.5px;color:rgba(255,255,255,.3)}
.blog-rest{display:flex;flex-direction:column;gap:0;max-width:1200px;margin:2px auto 0;border-top:none}
.bl{display:grid;grid-template-columns:180px 1fr;overflow:hidden;border-bottom:1px solid var(--border);transition:all .2s}
.bl:hover{background:rgba(0,0,0,.02)}
.bl-thumb{width:180px;height:120px;object-fit:cover;display:block;filter:grayscale(20%);transition:filter .3s}
.bl:hover .bl-thumb{filter:grayscale(0%)}
.bl-body{padding:20px 24px;display:flex;flex-direction:column;justify-content:space-between}
.bl-cat{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:var(--blue);margin-bottom:6px}
.bl-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:21px;font-weight:300;color:var(--ink);line-height:1.35;text-decoration:none;display:block;transition:color .2s}
.bl-title:hover{color:var(--blue)}
.bl-meta{font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.3px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.bl-link{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);text-decoration:none}
.bl-notice{background:rgba(245,242,236,.8);border:1px solid var(--border);border-radius:2px;padding:12px 16px;max-width:1200px;margin:0 auto 24px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--muted);font-weight:300}
.bl-notice a{color:var(--blue)}
.no-posts{text-align:center;padding:56px 0;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:20px;color:var(--muted)}
.blog-load{max-width:1200px;margin:0 auto;padding:56px 0;text-align:center}
.spinner{width:24px;height:24px;border:1px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.bl-more{text-align:center;margin-top:32px}
.bl-more a{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--ink);text-decoration:none;border-bottom:1px solid var(--border);padding-bottom:2px;transition:border-color .2s}
.bl-more a:hover{border-color:var(--ink)}

/* ── CONTACT — 대담한 텍스트 + 폼 ── */
.contact{display:grid;grid-template-columns:1fr 1fr;min-height:700px}
.cp{position:relative;overflow:hidden;min-height:500px}
.cp img{width:100%;height:100%;object-fit:cover;display:block}
.cp-ov{position:absolute;inset:0;background:linear-gradient(rgba(19,18,15,.3),rgba(19,18,15,.78));display:flex;flex-direction:column;justify-content:flex-end;padding:60px 56px}
.cp-tag{font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:16px}
.cp-h2{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(36px,5vw,60px);font-weight:400;color:var(--white);line-height:1.1;margin-bottom:40px}
.cp-h2 em{font-style:normal;color:#7BAAF7}
.cp-rows{display:flex;flex-direction:column;gap:14px}
.cp-row{display:flex;align-items:center;gap:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:300;color:rgba(255,255,255,.5)}
.cp-icon{width:32px;height:32px;border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.cfw{background:var(--cream2);display:flex;flex-direction:column;justify-content:center;padding:8% 7%}
.cfw-h3{font-family:'Playfair Display',serif;font-style:italic;font-size:32px;font-weight:400;color:var(--ink);margin-bottom:6px}
.cfw-sub{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;color:var(--muted);margin-bottom:44px;letter-spacing:.3px}
.ff{display:flex;flex-direction:column;gap:20px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.fg{display:flex;flex-direction:column;gap:6px}
.fg label{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink)}
.fg input,.fg textarea,.fg select{background:transparent;border:none;border-bottom:1px solid var(--border);padding:10px 0;font-family:'DM Sans','Noto Sans KR',sans-serif;font-size:15px;color:var(--ink);outline:none;transition:border-color .2s;-webkit-appearance:none;font-weight:300;border-radius:0}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--ink)}
.fg textarea{resize:none;height:80px}
.fsub{background:var(--ink);color:var(--cream);border:none;padding:14px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background .25s;margin-top:4px;width:100%}
.fsub:hover{background:var(--blue)}

/* ── FOOTER ── */
footer{background:var(--ink);padding:80px 6% 40px}
.ft{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:48px;margin-bottom:60px;padding-bottom:60px;border-bottom:1px solid rgba(255,255,255,.06);max-width:1200px;margin-left:auto;margin-right:auto}
.fb-desc{font-family:'DM Sans',sans-serif;font-size:13px;color:rgba(255,255,255,.25);line-height:1.9;font-weight:300;margin-top:16px}
.fc-h{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.2);margin-bottom:22px}
.fc ul{list-style:none;display:flex;flex-direction:column;gap:12px}
.fc ul a{font-family:'DM Sans',sans-serif;font-size:14px;color:rgba(255,255,255,.35);text-decoration:none;transition:color .2s;font-weight:300}
.fc ul a:hover{color:rgba(255,255,255,.7)}
.fb-bot{display:flex;justify-content:space-between;font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.5px;color:rgba(255,255,255,.15);max-width:1200px;margin:0 auto}

/* RESPONSIVE */
@media(max-width:960px){
  .contact{grid-template-columns:1fr}
  .about-top{grid-template-columns:1fr;min-height:auto}
  .about-headline-wrap{padding:100px 6% 60px}
  .about-stats{grid-template-columns:repeat(2,1fr)}
  .about-top{grid-template-columns:1fr;gap:40px}
  .instr-inner{grid-template-columns:1fr;gap:40px}
  .instr-photo{order:-1}
  .instr-photo-frame{width:220px;height:280px}
  .instr-photo::before{width:220px;height:280px}
  
  .pi-desc,.pi-tags{display:none}
  .field-strip{grid-template-columns:1fr 1fr;padding:0 6% 60px}
  .blog-grid{grid-template-columns:1fr}
  .bc-right{grid-template-rows:auto}
  .il-item{grid-template-columns:48px 1fr;gap:16px}
  .il-desc{display:none}
  .ft{grid-template-columns:1fr 1fr}
  .nav-links,.nav-cta{display:none}
  .ham{display:flex}
  .instr-content{padding:48px 32px}
  .fr{grid-template-columns:1fr}
}
@media(max-width:600px){
  .field-strip,.ft{grid-template-columns:1fr}
  
  .bl{grid-template-columns:1fr}
  .bl-thumb{width:100%;height:160px}
  .instr-cols{grid-template-columns:1fr}
}

/* ── PARTNERS ── */
.partners{padding:80px 0;background:var(--ink);overflow:hidden;border-top:1px solid rgba(255,255,255,.06)}
.partners-head{padding:0 6%;margin-bottom:40px;display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin-left:auto;margin-right:auto}
.ptag2{font-family:"DM Sans",sans-serif;font-size:10px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.25);display:flex;align-items:center;gap:10px}
.ptag2::before{content:"";width:20px;height:1px;background:rgba(255,255,255,.25)}
.partner-h2{font-family:"Playfair Display",serif;font-style:italic;font-size:clamp(28px,4vw,40px);font-weight:400;color:var(--white);margin-top:8px}
.marquee-outer{overflow:hidden;position:relative}
.marquee-outer::before,.marquee-outer::after{content:"";position:absolute;top:0;bottom:0;width:120px;z-index:2;pointer-events:none}
.marquee-outer::before{left:0;background:linear-gradient(to right,var(--ink),transparent)}
.marquee-outer::after{right:0;background:linear-gradient(to left,var(--ink),transparent)}
.marquee-track{display:flex;gap:0;animation:marqueeScroll 38s linear infinite}
.marquee-track:hover{animation-play-state:paused}
.marquee-set{display:flex;align-items:center;flex-shrink:0}
.partner-logo{
  display:flex;align-items:center;gap:14px;
  padding:0 40px;height:100px;
  border-right:1px solid rgba(255,255,255,.07);
  flex-shrink:0;
  transition:all .3s;
}
.partner-logo:hover{background:rgba(255,255,255,.03)}
.pl-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--blue);opacity:.5;flex-shrink:0;
}
.pl-names{display:flex;flex-direction:column;gap:4px}
.pl-kr{
  font-family:"Noto Sans KR",sans-serif;
  font-size:16px;font-weight:400;
  color:rgba(255,255,255,.75);
  white-space:nowrap;letter-spacing:.3px;
  transition:color .3s;line-height:1;
}
.pl-en{
  font-family:"DM Sans",sans-serif;
  font-size:11px;font-weight:300;
  color:rgba(255,255,255,.3);
  white-space:nowrap;letter-spacing:.8px;
  transition:color .3s;line-height:1;
}
.partner-logo:hover .pl-kr{color:rgba(255,255,255,1)}
.partner-logo:hover .pl-en{color:rgba(255,255,255,.55)}
@keyframes marqueeScroll{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

/* ── INSIGHT BOOKS ── */
.books{padding:120px 6%;background:var(--cream2)}
.books-head{display:flex;justify-content:space-between;align-items:flex-end;max-width:1200px;margin:0 auto 64px;flex-wrap:wrap;gap:20px}
.books-h2{font-family:"Playfair Display",serif;font-style:italic;font-size:clamp(32px,4.5vw,52px);font-weight:400;color:var(--ink);line-height:1.1}
.books-sub{font-family:"DM Sans",sans-serif;font-size:13px;font-weight:300;color:var(--muted);max-width:420px;line-height:1.8;margin-top:10px}
.books-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:900px;margin:0 auto}

.book-num{

.book-title-cover{

}
.book-author-cover{
  font-family:"DM Sans",sans-serif;

}

.book-tag{

}
.book-author{font-family:"DM Sans",sans-serif;font-size:12px;font-weight:300;color:var(--muted);margin-bottom:8px}
.book-desc{font-family:"DM Sans",sans-serif;font-size:12px;font-weight:300;color:var(--muted);line-height:1.75}
.book-recommend{

@media(max-width:960px){
  .books-grid{grid-template-columns:repeat(2,1fr);gap:20px}
  .marquee-track{animation-duration:20s}

@media(max-width:600px){
  .books-grid{grid-template-columns:1fr 1fr}
}


/* ── PROGRAM ACCORDION ── */

/* 헤더: 번호 + 제목 + 설명 + 태그 + 화살표 한 줄 */
.prog-item-header{
  display:flex;
  align-items:center;
  gap:0;
  padding:18px 0;
  transition:padding .3s;
  white-space:nowrap;
}
.prog-item.open .prog-item-header{padding-bottom:20px}
.prog-item:hover 
/* 왼쪽 파란 라인 호버 효과 */
.prog-item::after{
  content:"";position:absolute;left:0;top:0;bottom:0;
  width:0;background:var(--blue);
  transition:width .35s ease;opacity:.1;
}
.prog-item:hover::after,.prog-item.open::after{width:100%}
/* 번호 */

/* 제목 */

/* 한 줄 설명 (닫혔을 때만 보임) */
.pi-subtitle{
  font-family:"DM Sans",sans-serif;
  font-size:13px;font-weight:300;
  color:rgba(255,255,255,.35);
  line-height:1.5;
  transition:opacity .2s;
  flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  padding-right:16px;
}
.prog-item.open .pi-subtitle{opacity:0}
/* 화살표 버튼 */

.prog-item:hover 
/* 아코디언 상세 */
.prog-detail{
  max-height:0;overflow:hidden;
  transition:max-height .5s cubic-bezier(.4,0,.2,1),opacity .3s ease;
  opacity:0;
}
.prog-item.open .prog-detail{ max-height:0;opacity:0; }
.prog-detail-inner{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:32px;
  padding:4px 0 40px 96px;
  border-top:1px solid rgba(255,255,255,.06);
}
.pd-block{}
.pd-label{
  font-family:"DM Sans",sans-serif;
  font-size:9px;font-weight:500;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.25);margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.pd-label::before{content:"";width:12px;height:1px;background:rgba(255,255,255,.25)}
.pd-list{list-style:none;display:flex;flex-direction:column;gap:10px}
.pd-list li{
  font-family:"DM Sans","Noto Sans KR",sans-serif;
  font-size:13px;font-weight:300;
  color:rgba(255,255,255,.5);line-height:1.65;
  display:flex;align-items:flex-start;gap:10px;
}
.pd-list li::before{
  content:"";min-width:14px;height:1px;
  background:var(--blue);margin-top:9px;opacity:.6;
}
.pd-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.pd-tag{
  font-family:"DM Sans",sans-serif;font-size:10px;
  letter-spacing:1px;color:rgba(107,155,255,.75);
  border:1px solid rgba(107,155,255,.2);padding:4px 12px;
}
.pd-cta{
  display:inline-flex;align-items:center;gap:8px;
  font-family:"DM Sans",sans-serif;font-size:11px;
  font-weight:500;letter-spacing:2px;text-transform:uppercase;
  color:var(--blue);text-decoration:none;margin-top:20px;
  padding-bottom:2px;border-bottom:1px solid rgba(43,94,199,.35);

}
.pd-cta:hover{border-color:var(--blue)}
@media(max-width:960px){
  .pi-subtitle{font-family:"Noto Sans KR",sans-serif;font-size:13px;font-weight:300;color:rgba(255,255,255,.35);line-height:1.4;margin-top:6px;transition:color .3s;white-space:normal;overflow:visible;text-overflow:unset}

  .prog-detail-inner{grid-template-columns:1fr;padding-left:0}
}


/* ── PROGRAM MODAL ── */

.pm-title{font-family:"Playfair Display",serif;font-style:italic;font-size:clamp(22px,2.8vw,40px);font-weight:400;color:white;line-height:1.15;margin-bottom:20px;word-break:keep-all}

}

.pm-list{list-style:none;display:flex;flex-direction:column;gap:14px}
.pm-list li{
  font-family:"DM Sans","Noto Sans KR",sans-serif;
  font-size:15px;font-weight:300;color:rgba(255,255,255,.55);
  line-height:1.7;display:flex;align-items:flex-start;gap:12px;
}
.pm-list li::before{content:"";min-width:14px;height:1px;background:#2B5EC7;margin-top:10px;opacity:.7}
.pm-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.pm-tag{font-family:"DM Sans",sans-serif;font-size:12px;letter-spacing:1px;color:rgba(107,155,255,.75);border:1px solid rgba(107,155,255,.2);padding:7px 16px}
.pm-cta{
  display:inline-flex;align-items:center;gap:8px;
  font-family:"DM Sans",sans-serif;font-size:13px;font-weight:500;
  letter-spacing:2px;text-transform:uppercase;color:#2B5EC7;
  text-decoration:none;border-bottom:1px solid rgba(43,94,199,.35);
  padding-bottom:3px;transition:border-color .2s;margin-top:24px;
}
.pm-cta:hover{border-color:#2B5EC7}
@media(max-width:700px){
  .pm-top{grid-template-columns:1fr}
  .pm-img{min-height:180px}
  .pm-body{grid-template-columns:1fr}
  .pm-col{border-right:none;border-bottom:1px solid rgba(255,255,255,.07)}
  .pm-col:last-child{border-bottom:none}
  .pm-header{padding:28px 24px 20px}
  .pm-col{padding:20px 24px}
}

@keyframes fieldScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.btn-ink-dark{font-family:"DM Sans","Noto Sans KR",sans-serif;font-size:14px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--ink);background:transparent;border:2px solid var(--ink);padding:16px 40px;text-decoration:none;transition:all .3s}
.btn-ink-dark:hover{background:var(--ink);color:var(--cream)}
